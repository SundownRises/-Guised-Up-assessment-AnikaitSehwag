services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: guisedup
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  embedding:
    build:
      context: ./backend/python-embedding
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 10s
      start_period: 120s
      retries: 10

  api:
    build:
      context: ./backend/laravel-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "Guised Up API"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_KEY: base64:xJ3GQz5vF8Rq2pN7kL9mW4tY6uA0bC1dE8fH3jK5nO=
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: guisedup
      DB_USERNAME: postgres
      DB_PASSWORD: secret
      EMBEDDING_SERVICE_URL: http://embedding:8001
    depends_on:
      postgres:
        condition: service_healthy
      embedding:
        condition: service_healthy

volumes:
  pgdata:
